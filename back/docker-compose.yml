version: "3.9"
services:
  db:
    image: postgres:15
    container_name: 2d10_db
    restart: always
    environment:
      POSTGRES_USER: 2d10
      POSTGRES_PASSWORD: 2d10password
      POSTGRES_DB: 2d10
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: 2d10_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

  app:
    build: .
    container_name: 2d10_node_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://2d10:2d10password@db:5432/2d10?schema=public"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - db

volumes:
  db_data:
