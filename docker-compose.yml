
services:
  # Base de données PostgreSQL
  db:
    image: postgres:15
    container_name: 2d10_db
    restart: always
    environment:
      POSTGRES_USER: 2d10
      POSTGRES_PASSWORD: 2d10password
      POSTGRES_DB: 2d10
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - 2d10_network

  # Interface d'administration PostgreSQL
  pgadmin:
    image: dpage/pgadmin4
    container_name: 2d10_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - 2d10_network

  # Backend Node.js/Express
  back:
    build: 
      context: ./back
      dockerfile: Dockerfile
    container_name: 2d10_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://2d10:2d10password@db:5432/2d10?schema=public"
      NODE_ENV: production
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
      JWT_EXPIRES_IN: 24h
      PORT: 3000
      # Prisma
      PRISMA_GENERATE_DATAPROXY: "false"
    volumes:
      - ./back:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - db
    networks:
      - 2d10_network
    profiles:
      - back
      - full

  # Frontend (à venir)
  front:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: 2d10_frontend
    restart: always
    ports:
      - "3001:3001"
    environment:
      REACT_APP_API_URL: http://localhost:3000
      NODE_ENV: production
    depends_on:
      - back
    networks:
      - 2d10_network
    profiles:
      - front
      - full

  # Nginx (reverse proxy pour la production)
  nginx:
    image: nginx:alpine
    container_name: 2d10_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - back
      - front
    networks:
      - 2d10_network
    profiles:
      - production

volumes:
  db_data:

networks:
 2d10_network:
   driver: bridge
