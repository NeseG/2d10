# Profils :
#   prod   → db + back + web (front build) + nginx (http://localhost)
#   full   → db + pgadmin + back + front (Vite dev) — comme avant
#   back   → db + back seul
#   front  → db + back + front (Vite dev)
#   dev    → db + pgadmin (outils)
#
# Exemple production : docker compose --profile prod up -d --build
#
# Schéma Prisma → PostgreSQL (conteneur back déjà démarré, profil back / full / prod) :
#   docker compose --profile back exec back npx prisma db push
# Avec acceptation des pertes (comme au démarrage du back) :
#   docker compose --profile back exec back npm run prisma:push:docker

services:
  db:
    image: postgres:15
    container_name: 2d10_db
    restart: always
    environment:
      POSTGRES_USER: 2d10
      POSTGRES_PASSWORD: 2d10password
      POSTGRES_DB: 2d10
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U 2d10 -d 2d10"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - 2d10_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: 2d10_pgadmin
    restart: always
    profiles:
      - dev
      - full
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - 2d10_network

  back:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: 2d10_backend
    restart: always
    command: sh -c "npm ci && npm run prisma:generate && npm run prisma:push:docker && npx prisma db seed && npm start"
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://2d10:2d10password@db:5432/2d10?schema=public"
      NODE_ENV: production
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
      JWT_EXPIRES_IN: 24h
      PORT: 3000
    volumes:
      - ./back:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      db:
        condition: service_healthy
    networks:
      - 2d10_network
    profiles:
      - back
      - full
      - prod

  # Front développement (Vite)
  front:
    image: node:20-alpine
    container_name: 2d10_frontend
    restart: always
    working_dir: /usr/src/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: ""
      API_PROXY_TARGET: http://back:3000
      NODE_ENV: development
    volumes:
      - ./front:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - back
    networks:
      - 2d10_network
    profiles:
      - front
      - full

  # Front production (build statique + nginx interne), servi via le nginx edge
  web:
    build:
      context: ./front
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: ""
    image: 2d10-web:prod
    container_name: 2d10_web
    restart: always
    profiles:
      - prod
    depends_on:
      - back
    networks:
      - 2d10_network

  nginx:
    image: nginx:alpine
    container_name: 2d10_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - back
      - web
    networks:
      - 2d10_network
    profiles:
      - prod

volumes:
  db_data:

networks:
  2d10_network:
    driver: bridge
