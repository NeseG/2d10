
services:
  # Base de données PostgreSQL
  db:
    image: postgres:15
    container_name: 2d10_db
    restart: always
    environment:
      POSTGRES_USER: 2d10
      POSTGRES_PASSWORD: 2d10password
      POSTGRES_DB: 2d10
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U 2d10 -d 2d10"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - 2d10_network

  # Interface d'administration PostgreSQL
  pgadmin:
    image: dpage/pgadmin4
    container_name: 2d10_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - 2d10_network

  # Backend Node.js/Express
  back:
    build: 
      context: ./back
      dockerfile: Dockerfile
    container_name: 2d10_backend
    restart: always
    command: sh -c "npm ci && npm run prisma:generate && npm run prisma:push:docker && npx prisma db seed && npm start"
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://2d10:2d10password@db:5432/2d10?schema=public"
      NODE_ENV: production
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
      JWT_EXPIRES_IN: 24h
      PORT: 3000
    volumes:
      - ./back:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      db:
        condition: service_healthy
    networks:
      - 2d10_network
    profiles:
      - back
      - full

  # Frontend React (Vite)
  front:
    image: node:20-alpine
    container_name: 2d10_frontend
    restart: always
    working_dir: /usr/src/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      # Vide : le navigateur appelle http://<ton-ip>:5173/api/... (même hôte que Vite). Indispensable depuis le Wi‑Fi.
      VITE_API_BASE_URL: ""
      API_PROXY_TARGET: http://back:3000
      NODE_ENV: development
    volumes:
      - ./front:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - back
    networks:
      - 2d10_network
    profiles:
      - front
      - full

  # Nginx (reverse proxy pour la production)
  nginx:
    image: nginx:alpine
    container_name: 2d10_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - back
      - front
    networks:
      - 2d10_network
    profiles:
      - production

volumes:
  db_data:

networks:
 2d10_network:
   driver: bridge
